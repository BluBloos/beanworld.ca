<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#f4e8c1" surfaceScale="1.5" result="light">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="1" k2="0" k3="0" k4="0"/>
    </filter>
    <filter id="rough">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="warp"/>
      <feDisplacementMap in="SourceGraphic" in2="warp" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Parchment background -->
  <rect width="1000" height="700" fill="#f4e8c1"/>
  <rect width="1000" height="700" fill="#e6d5a8" opacity="0.3" filter="url(#paper)"/>

  <!-- Border -->
  <rect x="15" y="15" width="970" height="670" fill="none" stroke="#8b6914" stroke-width="3" rx="4"/>
  <rect x="22" y="22" width="956" height="656" fill="none" stroke="#8b6914" stroke-width="1" rx="3" opacity="0.5"/>

  <!-- Terrain features (hand-drawn style) -->
  <!-- Mountains -->
  <g filter="url(#rough)" opacity="0.6">
    <path d="M 650 200 L 680 140 L 710 195 L 740 130 L 770 190 L 800 150 L 830 200" fill="none" stroke="#5c3a2e" stroke-width="2" stroke-linecap="round"/>
    <path d="M 660 200 L 690 155 L 720 200" fill="none" stroke="#5c3a2e" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 730 195 L 755 145 L 780 195" fill="none" stroke="#5c3a2e" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Trees (forest area) -->
  <g opacity="0.5">
    <circle cx="150" cy="250" r="8" fill="#4a6741" stroke="#2c1810" stroke-width="1"/>
    <circle cx="170" cy="240" r="7" fill="#4a6741" stroke="#2c1810" stroke-width="1"/>
    <circle cx="160" cy="260" r="9" fill="#4a6741" stroke="#2c1810" stroke-width="1"/>
    <circle cx="140" cy="235" r="6" fill="#4a6741" stroke="#2c1810" stroke-width="1"/>
    <circle cx="185" cy="255" r="7" fill="#4a6741" stroke="#2c1810" stroke-width="1"/>
    <circle cx="130" cy="270" r="8" fill="#4a6741" stroke="#2c1810" stroke-width="1"/>
    <circle cx="175" cy="275" r="6" fill="#4a6741" stroke="#2c1810" stroke-width="1"/>
  </g>

  <!-- River -->
  <path d="M 400 0 C 420 100, 380 200, 430 300 S 460 400, 420 500 S 380 600, 400 700" fill="none" stroke="#5b8fa8" stroke-width="8" opacity="0.5" stroke-linecap="round"/>
  <path d="M 400 0 C 420 100, 380 200, 430 300 S 460 400, 420 500 S 380 600, 400 700" fill="none" stroke="#7badc4" stroke-width="4" opacity="0.4" stroke-linecap="round"/>

  <!-- Ocean area -->
  <g opacity="0.25">
    <path d="M 30 450 Q 80 440, 130 450 Q 180 460, 230 450" fill="none" stroke="#5b8fa8" stroke-width="1.5"/>
    <path d="M 50 470 Q 100 460, 150 470 Q 200 480, 250 470" fill="none" stroke="#5b8fa8" stroke-width="1.5"/>
    <path d="M 40 490 Q 90 480, 140 490 Q 190 500, 240 490" fill="none" stroke="#5b8fa8" stroke-width="1.5"/>
  </g>

  <!-- Valley area -->
  <g opacity="0.3">
    <path d="M 700 400 Q 750 380, 800 400 Q 850 420, 900 400" fill="none" stroke="#6b8e23" stroke-width="2"/>
    <path d="M 710 420 Q 760 400, 810 420 Q 860 440, 910 420" fill="none" stroke="#6b8e23" stroke-width="1.5"/>
  </g>

  <!-- Spawn marker -->
  <g transform="translate(500, 350)">
    <circle r="6" fill="#b8860b" stroke="#2c1810" stroke-width="2"/>
    <text y="-12" text-anchor="middle" font-family="serif" font-size="11" fill="#2c1810" font-style="italic">Spawn</text>
  </g>

  <!-- Compass Rose -->
  <g transform="translate(900, 100)">
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#8b6914" stroke-width="1.5"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#8b6914" stroke-width="1.5"/>
    <polygon points="0,-30 -5,-10 5,-10" fill="#8b6914"/>
    <polygon points="0,30 -5,10 5,10" fill="#8b6914" opacity="0.4"/>
    <polygon points="-30,0 -10,-5 -10,5" fill="#8b6914" opacity="0.4"/>
    <polygon points="30,0 10,-5 10,5" fill="#8b6914" opacity="0.4"/>
    <text y="-35" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8b6914">N</text>
    <text y="48" text-anchor="middle" font-family="serif" font-size="10" fill="#8b6914">S</text>
    <text x="-38" y="4" text-anchor="middle" font-family="serif" font-size="10" fill="#8b6914">W</text>
    <text x="38" y="4" text-anchor="middle" font-family="serif" font-size="10" fill="#8b6914">E</text>
  </g>

  <!-- Title cartouche -->
  <g transform="translate(500, 60)">
    <rect x="-140" y="-25" width="280" height="40" rx="4" fill="#f4e8c1" stroke="#8b6914" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-family="serif" font-size="20" font-weight="bold" fill="#2c1810" letter-spacing="3">BEAN WORLD</text>
  </g>

  <!-- Scale hint -->
  <g transform="translate(100, 630)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#8b6914" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#8b6914" stroke-width="1.5"/>
    <line x1="80" y1="-5" x2="80" y2="5" stroke="#8b6914" stroke-width="1.5"/>
    <text x="40" y="-8" text-anchor="middle" font-family="serif" font-size="10" fill="#5c3a2e" font-style="italic">~500 blocks</text>
  </g>
</svg>
